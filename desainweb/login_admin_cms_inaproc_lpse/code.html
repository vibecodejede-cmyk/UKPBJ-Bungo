<!-- Login Container -->
<main class="relative z-10 w-full max-w-[440px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Logo Branding Section -->
<div class="flex flex-col items-center mb-xl">
<div class="flex items-center gap-sm mb-base">
<div class="p-2 bg-primary rounded-lg">
<span class="material-symbols-outlined text-on-primary text-[32px]" data-icon="account_balance">account_balance</span>
</div>

<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Government Portal</span>
</div>
</div>

<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-xl institutional-shadow">
<header class="mb-lg">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-xs">Login CMS Admin</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Silakan masuk menggunakan akun administratif Anda.</p>
</header>
<form action="#" class="space-y-md" onsubmit="event.preventDefault();">
<!-- Email/Username Field -->
<div class="space-y-base">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="identity">Username atau Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary" data-icon="person">person</span>
<input class="w-full pl-10 pr-md py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md input-focus transition-all" id="identity" name="identity" placeholder="admin@lpse.go.id" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-base">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Kata Sandi</label>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">Lupa Kata Sandi?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-md py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md input-focus transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Captcha Placeholder -->
<div class="space-y-base">
<label class="font-label-sm text-label-sm text-on-surface-variant">Verifikasi Keamanan (Captcha)</label>
<div class="flex gap-sm p-sm bg-surface-container rounded-lg border border-outline-variant">
<div class="flex-1 h-12 flex items-center justify-center bg-white rounded border border-outline-variant select-none overflow-hidden">
<span class="font-bold text-xl italic tracking-widest text-primary-container blur-[1px]">X 7 2 B 9</span>
</div>
<button class="flex items-center justify-center w-12 h-12 rounded bg-surface-container-high hover:bg-surface-variant transition-colors text-outline" type="button">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
</button>
</div>
<input class="w-full px-md py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md input-focus" id="captcha" name="captcha" placeholder="Ketik kode di atas" required="" type="text"/>

<!-- Login Button -->
<button class="w-full bg-primary-container text-on-primary py-3 px-lg rounded-lg font-label-md text-label-md hover:bg-primary transition-all duration-300 transform active:scale-[0.98] mt-lg flex items-center justify-center gap-sm" type="submit">
<span class="material-symbols-outlined" data-icon="login">login</span>

<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Simple button loading simulation
        const loginBtn = document.querySelector('button[type="submit"]');
        loginBtn.addEventListener('click', (e) => {
            const form = e.target.closest('form');
            if (form.checkValidity()) {
                loginBtn.innerHTML = `<span class="animate-spin material-symbols-outlined" data-icon="progress_activity">progress_activity</span> Memproses...`;
                loginBtn.disabled = true;
                setTimeout(() => {
                    loginBtn.innerHTML = `<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> BERHASIL`;
                    loginBtn.classList.remove('bg-primary-container');
                    loginBtn.classList.add('bg-secondary');
                }, 1500);
            }
        });
    </script>
